<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.cdnfonts.com/css/valorant" rel="stylesheet">
                
</head>
<body>

    <div id="header">
        <div class="logo">
            <div class="logo-name">
                VALORANT

            </div>
        </div>
        <div class="search">
           
                <input type="text" placeholder="Search for the Agent..." id="input">
               
            
        </div>
        <div class="sort">
  
                <select name=""  id="sort-btn">
                    <option value="" selected disabled >Sort By</option>
                    <option value="A-Z" id="a-z" >A-Z</option>
                     <option value="Z-A" >Z-A</option>
                </select>
          
        </div>
        <div class="filter">
            <select name=""  id="filter-btn">
                    <option value="" selected disabled >Filter By</option>
                    <option value="a" >Controller</option>
                     <option value="b" >Initiator</option>
                     <option value="c" >Sentinal</option>
                     <option value="d" >Duelist</option>
                </select>

        </div>
    </div>
    <!-- <div id="displayy">

    </div> -->
    <div id="container">

    </div>

  


    </div>
    <script src="script.js"></script>
</body>
</html>
